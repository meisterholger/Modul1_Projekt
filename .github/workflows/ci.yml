name: CI/CD Pipeline

run-name: Run Lint → Tests → Docker Build

on:
  # Manually trigger workflow
  workflow_dispatch:
  # Workflow run trigger events
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  # Stage 1: Code Quality & Linting
  lint:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
      
      - name: Install dependencies
        run: pip install -e ".[dev,lint]"
      
      - name: Check ruff formatting
        run: ruff check . && ruff format --check .

      - name: Run pylint
        run: pylint app/ tests/ main.py

  # Stage 2: Tests (depends on lint)
  test:
    runs-on: ubuntu-latest
    needs: lint
        
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
      
      - name: Display Python version
        run: python --version
      
      - name: Install dependencies
        run: pip install -e ".[dev]"
      
      - name: Run tests
        run: pytest tests/ -v --tb=short

  # Stage 3: Docker Build (depends on test, only on main branch)
  docker-build:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/api-service:latest
